name: Verify PostgreSQL Database

on: 
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  verify-sql:
    name: Verify Database Schema & Queries
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:alpine
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3

      - name: Install PostgreSQL Client tools
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Provision Core Schema & Indexes
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -f schema.sql

      - name: Bulk Ingest Synthetic CSV Datasets
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -f scripts/load_data.sql

      - name: Deploy Automations & Procedures
        run: |
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -f sql_queries/procedures/proc_process_order.sql
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -f sql_queries/procedures/proc_manage_customer.sql
          PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -f sql_queries/procedures/proc_generate_bi_report.sql

      - name: Run Test Executions of All 35+ Portfolio Queries
        run: |
          find sql_queries -name "*.sql" -exec sh -c '
            echo "Validating {}..."
            PGPASSWORD=postgres psql -h localhost -U postgres -d postgres -P pager=off -f "{}" > /dev/null
          ' \;
